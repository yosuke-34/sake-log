<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" preserveAspectRatio="xMidYMid meet" role="img" aria-label="二日酔いの5つの原因">
  <defs>
    <linearGradient id="hBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f7fc"/>
      <stop offset="100%" stop-color="#e0ecf4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="220" fill="url(#hBg)"/>
  <text x="300" y="28" text-anchor="middle" fill="#3C2A1E" font-size="14" font-weight="bold" font-family="sans-serif">二日酔いを引き起こす5つの原因</text>
  <g transform="translate(70,110)">
    <circle cx="0" cy="0" r="32" fill="rgba(197,61,67,0.12)" stroke="#C53D43" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#C53D43" font-size="10" font-weight="bold">①</text>
    <text x="0" y="10" text-anchor="middle" font-size="18">⚗️</text>
    <text x="0" y="55" text-anchor="middle" fill="#C53D43" font-size="10" font-weight="bold">アセト</text>
    <text x="0" y="68" text-anchor="middle" fill="#C53D43" font-size="10" font-weight="bold">アルデヒド</text>
  </g>
  <g transform="translate(180,110)">
    <circle cx="0" cy="0" r="32" fill="rgba(109,165,192,0.2)" stroke="#5a8aa5" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#5a8aa5" font-size="10" font-weight="bold">②</text>
    <text x="0" y="10" text-anchor="middle" font-size="18">💧</text>
    <text x="0" y="55" text-anchor="middle" fill="#5a8aa5" font-size="10" font-weight="bold">脱水</text>
  </g>
  <g transform="translate(290,110)">
    <circle cx="0" cy="0" r="32" fill="rgba(139,105,20,0.15)" stroke="#8B6914" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#8B6914" font-size="10" font-weight="bold">③</text>
    <text x="0" y="10" text-anchor="middle" font-size="18">📉</text>
    <text x="0" y="55" text-anchor="middle" fill="#8B6914" font-size="10" font-weight="bold">低血糖</text>
  </g>
  <g transform="translate(400,110)">
    <circle cx="0" cy="0" r="32" fill="rgba(197,61,67,0.1)" stroke="#C53D43" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#C53D43" font-size="10" font-weight="bold">④</text>
    <text x="0" y="10" text-anchor="middle" font-size="18">🔥</text>
    <text x="0" y="55" text-anchor="middle" fill="#C53D43" font-size="10" font-weight="bold">胃酸過多</text>
  </g>
  <g transform="translate(520,110)">
    <circle cx="0" cy="0" r="32" fill="rgba(60,42,30,0.1)" stroke="#3C2A1E" stroke-width="1.5"/>
    <text x="0" y="-5" text-anchor="middle" fill="#3C2A1E" font-size="10" font-weight="bold">⑤</text>
    <text x="0" y="10" text-anchor="middle" font-size="18">🌙</text>
    <text x="0" y="55" text-anchor="middle" fill="#3C2A1E" font-size="10" font-weight="bold">睡眠の質</text>
    <text x="0" y="78" text-anchor="middle" fill="#3C2A1E" font-size="10" font-weight="bold">低下</text>
  </g>
  <g stroke="#b0c4d4" stroke-width="1" fill="none" opacity="0.6">
    <line x1="102" y1="110" x2="148" y2="110"/>
    <line x1="212" y1="110" x2="258" y2="110"/>
    <line x1="322" y1="110" x2="368" y2="110"/>
    <line x1="432" y1="110" x2="488" y2="110"/>
  </g>
  <text x="300" y="200" text-anchor="middle" fill="#5a6a7a" font-size="10">複数の要因が重なって、翌朝のつらさに</text>
</svg>
