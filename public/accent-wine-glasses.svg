<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 260" preserveAspectRatio="xMidYMid meet" role="img" aria-label="ワインの4つの種類">
  <defs>
    <linearGradient id="wGlassBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6f8"/>
      <stop offset="100%" stop-color="#f8ecf0"/>
    </linearGradient>
    <linearGradient id="redLiquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a52d35"/>
      <stop offset="100%" stop-color="#5a0f1a"/>
    </linearGradient>
    <linearGradient id="whiteLiquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2d99a"/>
      <stop offset="100%" stop-color="#d4b46a"/>
    </linearGradient>
    <linearGradient id="roseLiquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4b0b8"/>
      <stop offset="100%" stop-color="#d47580"/>
