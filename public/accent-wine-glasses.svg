  </defs>
  <rect width="600" height="260" fill="url(#wGlassBg)"/>
  <text x="300" y="28" text-anchor="middle" fill="#3C2A1E" font-size="14" font-weight="bold" font-family="sans-serif">ワインの4つの種類</text>
  <g transform="translate(90,130)">
    <path d="M -28 -50 Q -28 -22 -18 -5 Q -12 5 -12 18 L -12 55 L -20 55 L -20 62 L 20 62 L 20 55 L 12 55 L 12 18 Q 12 5 18 -5 Q 28 -22 28 -50 Z" fill="#fff" opacity="0.3" stroke="#b0a090" stroke-width="1"/>
    <path d="M -26 -47 Q -26 -24 -16 -8 L 16 -8 Q 26 -24 26 -47 Z" fill="url(#redLiquid)"/>
    <text x="0" y="90" text-anchor="middle" fill="#A52D35" font-size="11" font-weight="bold">赤ワイン</text>
    <text x="0" y="104" text-anchor="middle" fill="#6a5040" font-size="9">RED</text>
  </g>
  <g transform="translate(230,130)">
    <path d="M -28 -50 Q -28 -22 -18 -5 Q -12 5 -12 18 L -12 55 L -20 55 L -20 62 L 20 62 L 20 55 L 12 55 L 12 18 Q 12 5 18 -5 Q 28 -22 28 -50 Z" fill="#fff" opacity="0.3" stroke="#b0a090" stroke-width="1"/>
    <path d="M -26 -47 Q -26 -24 -16 -8 L 16 -8 Q 26 -24 26 -47 Z" fill="url(#whiteLiquid)"/>
    <text x="0" y="90" text-anchor="middle" fill="#8B6914" font-size="11" font-weight="bold">白ワイン</text>
    <text x="0" y="104" text-anchor="middle" fill="#6a5040" font-size="9">WHITE</text>
  </g>
  <g transform="translate(370,130)">
    <path d="M -28 -50 Q -28 -22 -18 -5 Q -12 5 -12 18 L -12 55 L -20 55 L -20 62 L 20 62 L 20 55 L 12 55 L 12 18 Q 12 5 18 -5 Q 28 -22 28 -50 Z" fill="#fff" opacity="0.3" stroke="#b0a090" stroke-width="1"/>
    <path d="M -26 -47 Q -26 -24 -16 -8 L 16 -8 Q 26 -24 26 -47 Z" fill="url(#roseLiquid)"/>
    <text x="0" y="90" text-anchor="middle" fill="#d47580" font-size="11" font-weight="bold">ロゼ</text>
    <text x="0" y="104" text-anchor="middle" fill="#6a5040" font-size="9">ROSÉ</text>
  </g>
  <g transform="translate(510,130)">
    <path d="M -22 -60 L -22 18 L -16 55 L -20 55 L -20 62 L 20 62 L 20 55 L 16 55 L 22 18 L 22 -60 Z" fill="#fff" opacity="0.3" stroke="#b0a090" stroke-width="1"/>
    <path d="M -20 -55 L -20 15 L -14 50 L 14 50 L 20 15 L 20 -55 Z" fill="url(#sparkLiquid)"/>
    <g fill="#fff" opacity="0.85">
      <circle cx="-10" cy="-30" r="1.8"/>
      <circle cx="5" cy="-20" r="1.5"/>
      <circle cx="-5" cy="-5" r="1.8"/>
      <circle cx="10" cy="5" r="1.5"/>
      <circle cx="-8" cy="20" r="1.3"/>
      <circle cx="6" cy="30" r="1.5"/>
      <circle cx="-3" cy="40" r="1.2"/>
